            font-family: inherit;

            right: 20px;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        .tools:hover {

        // 2. PARSE THE CSV INTO A DICTIONARY
        const engines = {};
        rawJean.split('\n').forEach(line => {

    // The default fallback if you just type a normal sentence
const defaultEngine = "https://google.com/search?hl=en&safe=off&num=50&pws=0&q=%s";

        // 3. THE DISPATCHER BEHAVIOUR
        function executeCommand(query) {
            if (!query) return;
            
            query = query.trim();
            const spaceIndex = query.indexOf(' ');
            
            let shortcut = query;
            let searchTerm = "";

            if (spaceIndex > -1) {
                shortcut = query.substring(0, spaceIndex).trim();
                searchTerm = query.substring(spaceIndex + 1).trim();
            }

            let targetUrl = engines[shortcut];

            if (targetUrl) {
                if (searchTerm) {
                    // Execute the search
                    window.location.href = targetUrl.replace('%s', encodeURIComponent(searchTerm));
                } else {
                    // If you just type 'r' with no search, go to the Reddit homepage (or relevant root)
                    window.location.href = targetUrl.split('?')[0].split('/search')[0]; 
                }
            } else {
                // If it isn't a recognised shortcut, just treat it as a standard Google search
                window.location.href = defaultEngine.replace('%s', encodeURIComponent(query));
            }
        }

        // 4. CHECK HOW THE PAGE WAS LOADED
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.has('q')) {
            // MODE A: Loaded via Chrome Omnibox dispatcher. Hide the UI and execute instantly.
            document.body.style.display = 'none'; 
            executeCommand(urlParams.get('q'));
        } else {
            // MODE B: Loaded directly as a startpage. Listen for the Enter key.
            document.getElementById('cmd').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    executeCommand(this.value);
                }
            });
